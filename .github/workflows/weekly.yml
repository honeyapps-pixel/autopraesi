name: AutoPräsi Weekly

# Wöchentlicher Job: erstellt donnerstags die Präsentation für den kommenden Sonntag.
# GitHub-Cron läuft in UTC und kennt keine Sommer-/Winterzeit:
#   0 6 * * 4  = Donnerstag 06:00 UTC = 07:00 CET (Winter) / 08:00 CEST (Sommer).
# Unkritisch – der Job muss nur vor Sonntag laufen.
on:
  schedule:
    - cron: "0 6 * * 4"
  workflow_dispatch: {}   # erlaubt manuelles Auslösen (Actions-Tab > Run workflow)

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: autopraesi_python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
